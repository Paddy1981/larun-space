name: Deploy cloud/ → gh-pages (sattrack.larun.space)

on:
  push:
    branches:
      - master
    paths:
      - "cloud/**"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy cloud/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cloud
          publish_branch: gh-pages
          cname: sattrack.larun.space
          force_orphan: false
          commit_message: "deploy: ${{ github.sha }}"
