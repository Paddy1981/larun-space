<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LARUN SatTrack — Real-Time Satellite Tracker</title>
  <meta name="description" content="Real-time satellite tracking, pass predictions, and conjunction alerts powered by LARUN SatTrack." />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Local styles -->
  <link rel="stylesheet" href="css/sattrack.css" />
</head>
<body>

  <!-- ── NAV ─────────────────────────────────────────────────── -->
  <nav class="nav">
    <a class="nav-brand" href="https://larun.space">
      LARUN<span class="dot">.</span>SPACE
    </a>
    <span class="nav-badge">SatTrack</span>
    <div class="nav-spacer"></div>
    <a class="nav-link" href="https://larun.space/docs.html">Docs</a>
    <a class="nav-link" href="https://sattrack-production.up.railway.app/docs" target="_blank" rel="noopener">API</a>
    <a class="nav-link" href="https://larun.space" target="_blank" rel="noopener">larun.space ↗</a>
    <div class="auth-wrapper">
      <button id="auth-btn" class="nav-link nav-auth-btn">Sign In</button>
      <div id="auth-dropdown" class="auth-dropdown">
        <button id="signin-github" class="auth-option">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </button>
        <button id="signin-google" class="auth-option">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>
      </div>
    </div>
  </nav>

  <!-- ── THREE-PANEL LAYOUT ──────────────────────────────────── -->
  <div class="app-shell">

    <!-- LEFT: satellite list + search -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Satellites <span id="sat-count">…</span></h2>
        <input
          id="search-input"
          class="search-box"
          type="search"
          placeholder="Search name or NORAD ID…"
          autocomplete="off"
        />
        <div class="filter-row">
          <button class="filter-btn active" data-filter="ALL">All</button>
          <button class="filter-btn" data-filter="LEO">LEO</button>
          <button class="filter-btn" data-filter="MEO">MEO</button>
          <button class="filter-btn" data-filter="GEO">GEO</button>
          <button class="filter-btn" data-filter="HEO">HEO</button>
        </div>
      </div>

      <div class="sat-list" id="sat-list">
        <div class="sat-list-empty">Loading…</div>
      </div>

      <div class="sidebar-footer">
        Click a satellite for pass prediction
      </div>
    </aside>

    <!-- CENTRE: Leaflet map -->
    <main class="map-panel">
      <div id="map"></div>
      <div class="map-overlay">
        <button class="map-btn" id="btn-locate">⊕ My Location</button>
        <button class="map-btn" id="btn-clear">✕ Clear Track</button>
      </div>
    </main>

    <!-- RIGHT: weather + conjunctions -->
    <aside class="rightbar">
      <div class="panel">
        <div class="panel-title">Space Weather</div>

        <div class="weather-row">
          <span class="weather-label">Kp Index</span>
          <span class="weather-value" id="kp-value">—</span>
        </div>
        <div class="kp-bar">
          <div class="kp-bar-fill" id="kp-bar-fill" style="width:0%"></div>
        </div>

        <div class="weather-row" style="margin-top:10px">
          <span class="weather-label">F10.7 Flux</span>
          <span class="weather-value" id="f107-value">—</span>
        </div>

        <div style="margin-top:6px;font-size:0.65rem;color:var(--medium-gray)" id="weather-updated"></div>
      </div>

      <div class="rightbar-scroll">
        <div class="panel" style="border-bottom:none;flex:0">
          <div class="panel-title">Conjunction Alerts <span style="color:var(--error)">&lt;10 km</span></div>
        </div>
        <div class="conj-list" id="conj-list">
          <div class="conj-empty">Loading…</div>
        </div>
      </div>
    </aside>

  </div><!-- .app-shell -->

  <!-- ── PASS MODAL ───────────────────────────────────────────── -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Pass Predictions</h2>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-subtitle" id="modal-subtitle"></p>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>

  <!-- ── TOAST ────────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <!-- CDN libraries (non-module) — must load before ES modules -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GqaY=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.4/dist/satellite.min.js"></script>

  <!-- App (ES module) -->
  <script type="module" src="js/sattrack-app.js"></script>

</body>
</html>
